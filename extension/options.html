<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cài đặt Gmail Phishing Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 0 16px;
      background: #f7f8fa;
      color: #111827;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      color: #16a34a;
      font-weight: 700;
    }

    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Cài đặt Extension</h2>

    <label for="backendBaseUrl">Backend Base URL</label>
    <input id="backendBaseUrl" type="text" placeholder="http://127.0.0.1:8000" />
    <div class="hint">Không hardcode theo máy. Đổi được trên mọi máy.</div>

    <label for="healthPath">Health Path</label>
    <input id="healthPath" type="text" placeholder="/health" />
    <div class="hint">Dùng để test backend còn sống.</div>

    <label for="apiPath">API Path cần gọi</label>
    <input id="apiPath" type="text" placeholder="/api/scan-imap-batch" />
    <div class="hint">Endpoint mặc định để quét batch email IMAP.</div>

    <button id="saveBtn">Lưu cài đặt</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
